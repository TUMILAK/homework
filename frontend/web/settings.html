<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>设置 · 搜题 Agent</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/prefs.js"></script>
    <script src="/js/theme.js"></script>
  </head>
  <body class="page">
    <header class="topbar">
      <div class="brand">
        <h1>设置</h1>
        <span>模型、API Key 与后端</span>
      </div>
      <nav class="topnav" aria-label="主导航">
        <a class="navlink" href="/index.html">工作台</a>
        <a class="navlink primary" href="/settings.html">设置</a>
      </nav>
    </header>

    <main class="main main--narrow">
      <div class="card">
        <h2>后端</h2>
        <div class="form-row">
          <label for="backend">Backend Origin</label>
          <input id="backend" autocomplete="off" placeholder="http://127.0.0.1:8010" />
        </div>
        <div class="actions">
          <button id="probe" type="button">测试 /api/health</button>
          <button id="saveBackend" class="primary" type="button">保存</button>
        </div>
        <p id="probeOut" class="hint"></p>
      </div>

      <div class="card">
        <h2>模型与 API Key</h2>
        <p class="theme-hint">
          Key 仅保存在浏览器 localStorage，请求时直发后端再转发至模型厂商，服务端不落盘。
        </p>
        <div class="form-row">
          <label for="provider">当前使用</label>
          <select id="provider">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic 网关</option>
            <option value="custom">自定义 / 本地 Ollama 等</option>
          </select>
        </div>
        <div class="form-row">
          <label for="key">API Key</label>
          <input id="key" type="password" autocomplete="off" spellcheck="false" />
        </div>
        <div class="form-row">
          <label for="base">Base URL</label>
          <input id="base" autocomplete="off" />
        </div>
        <div class="form-row">
          <label for="model">Model</label>
          <input id="model" autocomplete="off" />
        </div>
        <div class="actions">
          <button id="validateKey" type="button">验证 Key</button>
          <button id="saveProvider" class="primary" type="button">保存当前提供商配置</button>
          <button id="clearKey" type="button">清空 Key</button>
        </div>
        <p id="validateOut" class="hint"></p>
      </div>

      <div class="card">
        <h2>外观 · 背景</h2>
        <p class="theme-hint">
          背景图从服务端 <code style="color: var(--text)">workspace/wallpaper/</code> 读取（与 ciallo agent 共用目录）。请将图片放入该目录后「刷新列表」并选用；本页不提供浏览器上传。
        </p>
        <div class="form-row">
          <label for="bgPreset">预设</label>
          <select id="bgPreset">
            <option value="plain">素色（默认）</option>
            <option value="graphite">石墨</option>
            <option value="aurora">微光</option>
            <option value="midnight">午夜</option>
            <option value="ocean">深海</option>
            <option value="ember">余烬</option>
            <option value="wallpaper">本地壁纸（wallpaper/）</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="form-row">
          <label for="wallpaperPick">workspace/wallpaper 中的图片</label>
          <select id="wallpaperPick">
            <option value="">（先点「刷新列表」）</option>
          </select>
          <div class="actions" style="margin-top: 0.75rem">
            <button id="wallpaperRefresh" type="button">刷新列表</button>
            <button id="wallpaperUsePick" type="button" class="primary">使用所选为背景</button>
          </div>
        </div>
        <div class="form-row">
          <div class="actions" style="margin-top: 0.25rem">
            <button id="wallpaperClear" type="button">清除壁纸</button>
          </div>
          <p id="wallpaperStatus" class="hint"></p>
        </div>
        <div class="form-row">
          <label for="bgCustom">自定义 CSS（仅「自定义」预设）</label>
          <textarea
            id="bgCustom"
            rows="3"
            spellcheck="false"
            placeholder="例：linear-gradient(160deg, #0f172a, #020617) fixed"
          ></textarea>
        </div>
        <div class="actions">
          <button id="saveTheme" type="button" class="primary">应用背景</button>
        </div>
      </div>

      <div class="card">
        <h2>回答存档</h2>
        <p class="theme-hint">
          搜题结果默认写入 <code style="color: var(--text)">souti_agent/answers/YYYY-MM-DD.md</code>，同一天多次回答追加到同一文件。
        </p>
        <div class="actions">
          <button id="listAnswers" type="button">刷新存档列表</button>
        </div>
        <ul id="answerList" class="hint" style="padding-left: 1.2rem"></ul>
      </div>
    </main>

    <script>
      const qs = (id) => document.getElementById(id);

      function loadProviderForm() {
        const pid = qs("provider").value;
        SoutiPrefs.setActiveProvider(pid);
        const cfg = SoutiPrefs.loadProviderConfig(pid);
        qs("key").value = cfg.apiKey;
        qs("base").value = cfg.baseUrl;
        qs("model").value = cfg.model;
      }

      function loadForm() {
        qs("backend").value = SoutiPrefs.backendOrigin();
        qs("provider").value = SoutiPrefs.activeProvider();
        loadProviderForm();
        const bg = AppPrefs.getUiBackground();
        qs("bgPreset").value = bg.preset;
        qs("bgCustom").value = bg.custom;
      }

      async function fetchWallpaperListPayload() {
        const origin = AppPrefs.backendOrigin().replace(/\/+$/, "");
        const listUrl = `${origin}/api/wallpaper/list`;
        let r = await fetch(listUrl);
        let j = await r.json().catch(() => ({}));
        if (r.ok) return j;
        if (r.status === 404) {
          r = await fetch(`${origin}/api/catalog`);
          j = await r.json().catch(() => ({}));
          if (!r.ok) {
            const d = j.detail || j.message || r.statusText;
            throw new Error(typeof d === "string" ? d : `catalog ${r.status}`);
          }
          const imgExt = /\.(jpe?g|png|webp|gif)$/i;
          const imgs = (j.files || []).filter((f) => {
            const p = String(f.path || "").replace(/\\/g, "/");
            return p.startsWith("wallpaper/") && imgExt.test(p);
          });
          const root = String(j.workspace || "").replace(/\\/g, "/").replace(/\/$/, "");
          return {
            workspace_root: j.workspace,
            wallpaper_dir: root ? `${root}/wallpaper` : "",
            files: imgs.map((f) => {
              const path = String(f.path || "").replace(/\\/g, "/");
              const name = path.replace(/^wallpaper\//, "").split("/").pop() || path;
              return { path, name, size: f.size };
            }),
            _via: "catalog",
          };
        }
        const d = j.detail || j.message || r.statusText;
        throw new Error(typeof d === "string" ? d : JSON.stringify(d));
      }

      async function refreshWallpaperList() {
        const j = await fetchWallpaperListPayload();
        const sel = qs("wallpaperPick");
        const want = AppPrefs.getUiBackground().wallpaperRel || "";
        sel.innerHTML = '<option value="">（不选用文件）</option>';
        for (const f of j.files || []) {
          const opt = document.createElement("option");
          opt.value = f.path;
          const kb = (f.size / 1024).toFixed(f.size >= 102400 ? 0 : 1);
          opt.textContent = `${f.name} · ${kb} KB`;
          sel.appendChild(opt);
        }
        if (want && [...sel.options].some((o) => o.value === want)) {
          sel.value = want;
        }
        const st = qs("wallpaperStatus");
        const rel = AppPrefs.getUiBackground().wallpaperRel;
        const via = j._via === "catalog" ? "（经 /api/catalog）" : "";
        st.textContent = [
          j.wallpaper_dir ? `目录：${j.wallpaper_dir}` : "",
          `共 ${(j.files || []).length} 个图片文件${via}。`,
          rel ? `当前背景：${rel}` : "当前未绑定 wallpaper 文件。",
        ]
          .filter(Boolean)
          .join(" ");
      }

      function commitWallpaperRel(relPath) {
        AppPrefs.setUiBackground({
          preset: "wallpaper",
          wallpaperRel: relPath,
          custom: qs("bgCustom").value,
        });
        qs("bgPreset").value = "wallpaper";
        AppTheme.apply();
      }

      qs("wallpaperRefresh").onclick = async () => {
        qs("probeOut").textContent = "加载壁纸列表…";
        try {
          await refreshWallpaperList();
          qs("probeOut").textContent = "已刷新 wallpaper 列表。";
        } catch (e) {
          qs("probeOut").textContent = `列表失败：${e.message || e}`;
        }
      };

      qs("wallpaperUsePick").onclick = async () => {
        const v = qs("wallpaperPick").value;
        if (!v) {
          qs("probeOut").textContent = "请先在列表中选择一项。";
          return;
        }
        commitWallpaperRel(v);
        loadForm();
        try {
          await refreshWallpaperList();
        } catch (_) {}
        qs("probeOut").textContent = `已使用：${v}`;
      };

      qs("saveTheme").onclick = async () => {
        const preset = qs("bgPreset").value;
        const custom = qs("bgCustom").value;
        const pick = qs("wallpaperPick").value;

        if (preset === "wallpaper" && pick) {
          commitWallpaperRel(pick);
          loadForm();
          await refreshWallpaperList().catch(() => {});
          qs("probeOut").textContent = `已应用：${pick}`;
          return;
        }

        if (preset !== "wallpaper") {
          AppPrefs.setUiBackground({ preset, custom, wallpaperRel: "" });
        } else {
          AppPrefs.setUiBackground({ preset, custom });
        }
        AppTheme.apply();
        loadForm();
        await refreshWallpaperList().catch(() => {});
        qs("probeOut").textContent = "已应用背景。";
      };

      qs("wallpaperClear").onclick = () => {
        AppPrefs.setUiBackground({ preset: "plain", wallpaperRel: "" });
        AppTheme.apply();
        loadForm();
        refreshWallpaperList().catch(() => {});
        qs("probeOut").textContent = "已清除壁纸并恢复素色预设。";
      };

      qs("provider").onchange = loadProviderForm;

      qs("saveBackend").onclick = () => {
        SoutiPrefs.setBackendOrigin(qs("backend").value);
        qs("probeOut").textContent = "已保存后端地址。";
      };

      qs("saveProvider").onclick = () => {
        const pid = qs("provider").value;
        SoutiPrefs.saveProviderConfig(pid, {
          apiKey: qs("key").value,
          baseUrl: qs("base").value,
          model: qs("model").value,
        });
        SoutiPrefs.setActiveProvider(pid);
        qs("validateOut").textContent = `已保存 ${SoutiPrefs.PROVIDERS[pid]?.label || pid} 配置。`;
      };

      qs("clearKey").onclick = () => {
        qs("key").value = "";
        SoutiPrefs.saveProviderConfig(qs("provider").value, { apiKey: "" });
        qs("validateOut").textContent = "已清空 Key（仅本地）。";
      };

      qs("validateKey").onclick = async () => {
        qs("validateOut").textContent = "验证中…";
        try {
          const r = await fetch(SoutiPrefs.apiUrl("/api/validate-key"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              api_key: qs("key").value,
              base_url: qs("base").value,
              model: qs("model").value,
            }),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.detail || r.statusText);
          qs("validateOut").textContent = j.ok
            ? `有效：${j.message}${j.sample ? " · " + j.sample : ""}`
            : `无效：${j.message}`;
        } catch (e) {
          qs("validateOut").textContent = `失败：${e.message || e}`;
        }
      };

      qs("probe").onclick = async () => {
        qs("probeOut").textContent = "探测中…";
        try {
          const r = await fetch(SoutiPrefs.apiUrl("/api/health"));
          const j = await r.json();
          qs("probeOut").textContent = `HTTP ${r.status} ${JSON.stringify(j)}`;
        } catch (e) {
          qs("probeOut").textContent = `失败：${e}`;
        }
      };

      qs("listAnswers").onclick = async () => {
        const ul = qs("answerList");
        ul.innerHTML = "";
        try {
          const r = await fetch(SoutiPrefs.apiUrl("/api/answers/list"));
          const j = await r.json();
          for (const name of j.files || []) {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = SoutiPrefs.apiUrl(`/api/answers/download?name=${encodeURIComponent(name)}`);
            a.textContent = name;
            a.target = "_blank";
            li.appendChild(a);
            ul.appendChild(li);
          }
          if (!ul.children.length) ul.textContent = "（暂无存档）";
        } catch (e) {
          ul.textContent = `列表失败：${e.message || e}`;
        }
      };

      loadForm();
      qs("listAnswers").click();
      refreshWallpaperList().catch((e) => {
        qs("wallpaperStatus").textContent =
          `无法加载列表：${e.message || e}（请确认后端已启动）`;
      });

      window.addEventListener("storage", () => {
        loadForm();
        refreshWallpaperList().catch(() => {});
        AppTheme.apply();
      });
    </script>
  </body>
</html>
